version: '3.8'

services:
  # Streamlit Web UI
  streamlit:
    build:
      context: ../..
      dockerfile: phase4/docker/Dockerfile
      target: streamlit
    container_name: closer_streamlit
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    env_file:
      - ../../.env
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
      - ../../exports:/app/exports
      - ../../cold_email_bot.db:/app/cold_email_bot.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - closer_network

  # FastAPI REST API
  api:
    build:
      context: ../..
      dockerfile: phase4/docker/Dockerfile
      target: api
    container_name: closer_api
    ports:
      - "8000:8000"
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    env_file:
      - ../../.env
    volumes:
      - ../../data:/app/data
      - ../../logs:/app/logs
      - ../../exports:/app/exports
      - ../../cold_email_bot.db:/app/cold_email_bot.db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - closer_network

  # Nginx reverse proxy (optional, for production)
  nginx:
    image: nginx:alpine
    container_name: closer_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - streamlit
      - api
    restart: unless-stopped
    networks:
      - closer_network
    profiles:
      - production

networks:
  closer_network:
    driver: bridge

volumes:
  data:
  logs:
  exports:
  database:
